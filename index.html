<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EXTWO - Streaming Online Free</title>

<script src="/media/video.js"></script>

<script src="/media/thumbnail.js"></script>

<script src="/media/judul.js"></script>

<script src="/media/iklan.js"></script>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
padding:10px;
width:250px;
border-radius:8px;
border:none;
}

@media(max-width:768px){

.header{
flex-direction:column;
gap:10px;
}

.search{
width:100%;
}

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#111827;
border-radius:8px;
overflow:hidden;
transition:.25s;
}

.card:hover{
transform:scale(1.05);
}

.thumb{
width:100%;
height:260px;
object-fit:cover;
}

.title{
padding:10px;
font-size:14px;
}

.watch{
display:block;
text-align:center;
background:#e11d48;
padding:10px;
color:white;
text-decoration:none;
}

.pagination{
text-align:center;
padding:20px;
}

.pagination button{
padding:10px;
margin:5px;
border:none;
background:#1f2937;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">EXTWO</div>

<input id="search" class="search" placeholder="Search movie">

</div>

<div id="ads-top"></div>

<div class="grid" id="videos"></div>

<div id="ads-middle"></div>

<div class="pagination" id="pagination"></div>

<script>

/* ========= LOAD ADS SCRIPT ========= */

function loadAd(containerId, adCode){

if(!adCode) return

const container = document.getElementById(containerId)

if(!container) return

container.innerHTML = adCode

const scripts = container.querySelectorAll("script")

scripts.forEach(oldScript=>{

const newScript=document.createElement("script")

if(oldScript.src){
newScript.src=oldScript.src
}else{
newScript.textContent=oldScript.textContent
}

document.body.appendChild(newScript)

})

}

/* ========= GLOBAL ADS ========= */

if(typeof ads!=="undefined"){

loadAd("ads-top",ads.top)

loadAd("ads-middle",ads.middle)

/* POPUNDER */
if(ads.popunder){
document.body.insertAdjacentHTML("beforeend",ads.popunder)
}

/* SOCIAL BAR */
if(ads.socialbar){
document.body.insertAdjacentHTML("beforeend",ads.socialbar)
}

/* HISTATS */
if(ads.histats){
document.body.insertAdjacentHTML("beforeend",ads.histats)
}

}

/* ========= PARSER ========= */

function parse(str){
return str
.trim()
.split("\n")
.map(v=>v.trim())
.filter(v=>v!=="")
}

/* ========= VIDEO ID DETECTOR ========= */

function getVideoId(url){

url=url.split("?")[0]

if(url.includes("xfree-prod/")){
let path=url.split("xfree-prod/")[1]
return "xf/"+path
}

if(url.includes("post_public/")){
let path=url.split("post_public/")[1]
return path.replace(".mp4","")
}

if(url.includes("videy.co")){
return url.split("/").pop().replace(".mp4","")
}

if(url.includes("qu.ax")){
return url.split("/").pop().replace(".mp4","")
}

return url.split("/").pop().replace(".mp4","")

}

/* ========= LOAD DATA ========= */

const videoArray=parse(videoList)
const thumbArray=parse(thumbnailList)
const titleArray=parse(judulList)


const videos=videoArray.map((url,i)=>{

return{
id:getVideoId(url),
src:url,
thumb:thumbArray[i]||"",
title:titleArray[i]||"Video "+(i+1)
}

})

/* ========= PAGINATION ========= */

let page=1
let perPage=12
let filteredVideos=videos

function render(){

let container=document.getElementById("videos")

container.innerHTML=""

let start=(page-1)*perPage
let end=start+perPage

filteredVideos.slice(start,end).forEach(v=>{

container.innerHTML+=`

<div class="card">

<img class="thumb" src="${v.thumb}" loading="lazy">

<div class="title">${v.title}</div>

<a class="watch" href="/v/?id=${v.id}">
WATCH
</a>

</div>

`

})

pagination()

}

/* ========= PAGINATION BUTTON ========= */

function pagination(){

let total=Math.ceil(filteredVideos.length/perPage)

let html=""

for(let i=1;i<=total;i++){
html+=`<button onclick="go(${i})">${i}</button>`
}

document.getElementById("pagination").innerHTML=html

}

function go(p){
page=p
render()
}

/* ========= SEARCH ========= */

document.getElementById("search").addEventListener("keyup",function(){

let q=this.value.toLowerCase()

filteredVideos=videos.filter(v =>
v.title.toLowerCase().includes(q)
)

page=1

render()

})

/* ========= START ========= */

render()

</script>
