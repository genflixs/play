function dec(str){
return atob(str);
}

const timer=document.getElementById("timer");
const btn=document.getElementById("downloadBtn");

const realUrl=dec(data);

btn.href=realUrl;

btn.addEventListener("click",function(){

});

}

},1000);

const smartlink="https://omg10.com/4/10410353";
