<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIDEY.CO</title>

<meta property="og:title" content="VIDEY.CO Player">
<meta property="og:type" content="video.other">
<meta property="og:description" content="Watch video instantly">

<link rel="preconnect" href="https://cdn.videy.co">

<style>

:root{
--bg:#f4f4f4;
--text:#111;
--card:#ffffff;
--accent:#ff2d2d;
}

body.dark{
--bg:#0f0f0f;
--text:#ffffff;
--card:#1a1a1a;
}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
transition:.3s;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
background:var(--card);
box-shadow:0 4px 20px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:100;
}

.home{
text-decoration:none;
font-weight:600;
color:var(--text);
}

.title{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:18px;
font-weight:700;
}

.right{
display:flex;
gap:10px;
}

/* BUTTON */

.btn{
padding:8px 14px;
border-radius:6px;
text-decoration:none;
background:#444;
color:#fff;
font-size:14px;
}

.mode{
cursor:pointer;
padding:8px 10px;
border-radius:6px;
background:#ddd;
}

body.dark .mode{
background:#333;
color:#fff;
}

/* LAYOUT */

.container{
max-width:950px;
margin:auto;
padding:20px;
}

/* PLAYER */

.player{
position:relative;
width:100%;
padding-top:56.25%;
background:#000;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.2);
}

.player video,
.player iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* DOWNLOAD AREA */

.download-row{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}

.download-btn,
.hd-btn{
padding:16px 34px;
border-radius:12px;
font-weight:700;
text-decoration:none;
color:#fff;
font-size:15px;
letter-spacing:.4px;
display:inline-flex;
align-items:center;
gap:8px;
transition:all .25s ease;
box-shadow:0 6px 20px rgba(0,0,0,.25);
}

.download-btn{
background:linear-gradient(135deg,#ff2d2d,#ff6b6b);
}

.download-btn:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 12px 35px rgba(255,45,45,.6);
}

.hd-btn{
background:linear-gradient(135deg,#1e88e5,#42a5f5);
}

.hd-btn:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 12px 35px rgba(30,136,229,.6);
}

/* AD BANNER */

.ad-banner{
margin-top:20px;
display:flex;
justify-content:center;
}

/* ADS PLAYER */

.ad-overlay{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%);
width:320px;
height:50px;
z-index:6;
display:none;
}

.ad-close{
position:absolute;
top:-8px;
right:-8px;
background:#000;
color:#fff;
width:22px;
height:22px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* VIRAL */

.viral-actions{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.viral-actions button{
background:var(--card);
border:1px solid rgba(0,0,0,.1);
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

</style>

</head>

<body>

<div class="navbar">

<a href="https://omg10.com/4/10410353" class="home">Home</a>

<div class="title">VIDEY.CO</div>

<div class="right">
<a href="https://omg10.com/4/10410353" class="btn">Upload</a>
<div class="mode" onclick="toggleMode()">🌙</div>
</div>

</div>

<div class="container">

<div class="player" id="playerWrap">

<video
id="videoPlayer"
controls
controlsList="nodownload"
playsinline
webkit-playsinline
preload="metadata"
poster="https://i.pinimg.com/736x/25/c9/f1/25c9f190574aa76d0b9b2802a481873e.jpg"
></video>

<div class="ad-overlay" id="adOverlay">

<div class="ad-close" onclick="closeAd()">×</div>

<script>
  atOptions = {
    'key' : '508bcf5f3702d4bd48d225b529385479',
    'format' : 'iframe',
    'height' : 50,
    'width' : 320,
    'params' : {}
  };
</script>
<script src="https://fundingfashioned.com/508bcf5f3702d4bd48d225b529385479/invoke.js"></script>

</div>

</div>

<!-- DOWNLOAD BUTTONS -->

<div class="download-row">

<a href="#" id="downloadBtn" class="download-btn">DOWNLOAD</a>

<a href="#" id="hdBtn" class="hd-btn">GET FULL HD</a>

</div>

<!-- ADSTERRA BANNER -->

<div class="ad-banner">

<script>
  atOptions = {
    'key' : '508bcf5f3702d4bd48d225b529385479',
    'format' : 'iframe',
    'height' : 50,
    'width' : 320,
    'params' : {}
  };
</script>
<script src="https://fundingfashioned.com/508bcf5f3702d4bd48d225b529385479/invoke.js"></script>

</div>

<!-- VIRAL BUTTONS -->

<div class="viral-actions">

<button onclick="likeVideo()">👍 Like <span id="likeCount">0</span></button>
<button onclick="shareVideo()">🔁 Share</button>
<button onclick="followPage()">👤 Follow</button>
<button onclick="copyLink()">🔗 Copy Link</button>

</div>

</div>

<script>

/* SMART PLAYER */

(function(){

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

const player=document.getElementById("videoPlayer");
const wrap=document.getElementById("playerWrap");

if(!id){

wrap.innerHTML="<h2 style='text-align:center;padding:40px'>No video ID found</h2>";
return;

}

let sources=[];

if(id.startsWith("xf/")){

let path=id.replace("xf/","");
sources=[enc(`https://cdn.xfree.com/xfree-prod/${path}`)];

}

else if(id.includes("/") && id.includes(".mp4")){

sources=[enc(`https://www.xxxfollow.com/media/fans/post_public/${id}`)];

}

else{

sources=[
enc(`https://cdn2.videy.co/${id}`),
enc(`https://qu.ax/x/${id}`),
enc(`https://qu.ax/f/${id}`)
];

}

let index=0;

function loadSource(){

if(index>=sources.length){

fallbackIframe();
return;

}

const realSrc=dec(sources[index]);

player.src=realSrc;
player.load();

/* AUTO SET DOWNLOAD LINK */
const dl=document.getElementById("downloadBtn");
if(dl){
const real=dec(sources[index]);
const encoded=btoa(real);

dl.href="safelink.html?data="+encoded;
}

}

player.addEventListener("error",function(){

index++;
loadSource();

});

player.addEventListener("stalled",function(){

index++;
loadSource();

});

function fallbackIframe(){

wrap.innerHTML=
`<iframe src="${sources[0]}" allowfullscreen frameborder="0"
style="width:100%;height:100%;position:absolute;top:0;left:0"></iframe>`;

}

loadSource();

/* SIMPLE URL ENCRYPT */

function enc(str){
return btoa(str);
}

function dec(str){
return atob(str);
}


})();


/* ENCRYPTED SMARTLINK */

const hdLink="aHR0cHM6Ly9vbWcxMC5jb20vNC8xMDQxMDM1Mw==";

function dec(str){
return atob(str);
}

document.getElementById("hdBtn").addEventListener("click",function(e){

e.preventDefault();

const real=dec(hdLink);

window.open(real,"_blank");

});
/* AUTO FULLSCREEN */

const video=document.getElementById("videoPlayer");
const playerWrap=document.getElementById("playerWrap");

video.addEventListener("play",function(){

if(!document.fullscreenElement){

if(playerWrap.requestFullscreen){
playerWrap.requestFullscreen();
}

else if(playerWrap.webkitRequestFullscreen){
playerWrap.webkitRequestFullscreen();
}

}

});

/* DARK MODE */

function toggleMode(){
document.body.classList.toggle("dark");
}

/* PLAYER ADS */

setTimeout(()=>{
document.getElementById("adOverlay").style.display="block";
},5000);

function closeAd(){
document.getElementById("adOverlay").remove();
}

/* BACK BUTTON */

history.pushState(null,null,location.href);

window.onpopstate=function(){
location.href="/";
};

/* LIKE */

let likes=localStorage.getItem("likes")||0;
document.getElementById("likeCount").innerText=likes;

function likeVideo(){
likes++;
localStorage.setItem("likes",likes);
document.getElementById("likeCount").innerText=likes;
}

/* SHARE */

function shareVideo(){

const url=window.location.href;

if(navigator.share){

navigator.share({
title:"Watch this video",
url:url
});

}else{

copyLink();
alert("Link copied!");

}

}

/* FOLLOW */

function followPage(){
window.open("https://www.facebook.com/profile.php?id=61552244000177","_blank");
}

/* COPY LINK */

function copyLink(){

const url=window.location.href;

navigator.clipboard.writeText(url);

alert("Link copied!");

}

/* DECODE FUNCTION */
function dec(str){
  return atob(str);
}

/* AMBIL PARAM VIDEO ID */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const player = document.getElementById("videoPlayer");
const wrap = document.getElementById("playerWrap");
let sources = [];

/* TENTUKAN SUMBER VIDEO */
if(!id){
  wrap.innerHTML = "<h2 style='text-align:center;padding:40px'>No video ID found</h2>";
} else if(id.startsWith("xf/")){
  let path = id.replace("xf/","");
  sources = [dec(ENCODED.xfree) + path];
} else if(id.includes("/") && id.includes(".mp4")){
  sources = [dec(ENCODED.xfollow) + id];
} else {
  sources = [
    dec(ENCODED.videy) + id,
    dec(ENCODED.quax_x) + id,
    dec(ENCODED.quax_f) + id
  ];
}

let index = 0;

/* LOAD PLAYER */
function loadSource(){
  if(index >= sources.length){
    wrap.innerHTML = `<iframe src="${sources[0]}" allowfullscreen frameborder="0"
    style="width:100%;height:100%;position:absolute;top:0;left:0"></iframe>`;
    return;
  }
  player.src = sources[index];
  player.load();

  /* SET DOWNLOAD LINK */
  const dl = document.getElementById("downloadBtn");
  if(dl) dl.href = sources[index];
}

player.addEventListener("error", function(){
  index++;
  loadSource();
});
player.addEventListener("stalled", function(){
  index++;
  loadSource();
});

loadSource();

/* DOWNLOAD BUTTON OPEN NEW TAB */
document.getElementById("downloadBtn").addEventListener("click", function(e){
  e.preventDefault();
  const url = this.href; // sudah decode otomatis
  window.open(url,"_blank");
});

/* GET FULL HD BUTTON OPEN SMARTLINK */
document.getElementById("hdBtn").addEventListener("click", function(e){
  e.preventDefault();
  const url = dec(ENCODED.smartlink);
  window.open(url,"_blank");
});

</script>
<script src="config.js"></script>
</body>

</html>
