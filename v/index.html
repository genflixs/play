  // set <title> dan og:title

<style>
:root{
--bg:#f4f4f4;
--text:#111;
--card:#ffffff;
--accent:#ff2d2d;
}
body.dark{
--bg:#0f0f0f;
--text:#ffffff;
--card:#1a1a1a;
}
body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
transition:.3s;
}
.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
background:var(--card);
box-shadow:0 4px 20px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:100;
}
.home{
text-decoration:none;
font-weight:600;
color:var(--text);
}
.title{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:18px;
font-weight:700;
}
.right{
display:flex;
gap:10px;
}
.btn{
padding:8px 14px;
border-radius:6px;
text-decoration:none;
background:#444;
color:#fff;
font-size:14px;
}
.mode{
cursor:pointer;
padding:8px 10px;
border-radius:6px;
background:#ddd;
}
body.dark .mode{
background:#333;
color:#fff;
}
.container{
max-width:950px;
margin:auto;
padding:20px;
}
.player{
position:relative;
width:100%;
padding-top:56.25%;
background:#000;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.2);
}
.player video,
.player iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}
.download-row{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
flex-wrap:wrap;
}
.download-btn,
.hd-btn{
padding:16px 34px;
border-radius:12px;
font-weight:700;
text-decoration:none;
color:#fff;
font-size:15px;
letter-spacing:.4px;
display:inline-flex;
align-items:center;
gap:8px;
transition:all .25s ease;
box-shadow:0 6px 20px rgba(0,0,0,.25);
}
.download-btn{
background:linear-gradient(135deg,#ff2d2d,#ff6b6b);
}
.hd-btn{
background:linear-gradient(135deg,#1e88e5,#42a5f5);
}
.ad-banner{
margin-top:20px;
display:flex;
justify-content:center;
}
.ad-overlay{
position:absolute;
bottom:65px;
left:50%;
transform:translateX(-50%);
width:320px;
height:50px;
z-index:6;
display:none;
}
.ad-close{
position:absolute;
top:-8px;
right:-8px;
background:#000;
color:#fff;
width:22px;
height:22px;
border-radius:50%;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
.viral-actions{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}
.viral-actions button{
background:var(--card);
border:1px solid rgba(0,0,0,.1);
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}
</style>

</head>
<body>

<div class="navbar">
<a href="/" class="home">Home</a>
<div class="title">VIDEY.CO</div>
<div class="right">
<a href="#" class="btn">Upload</a>
<div class="mode" onclick="toggleMode()">🌙</div>
</div>
</div>

<div class="container">
<div class="player" id="playerWrap">
<video
id="videoPlayer"
controls
controlsList="nodownload"
playsinline
webkit-playsinline
preload="metadata"
poster="https://i.pinimg.com/736x/25/c9/f1/25c9f190574aa76d0b9b2802a481873e.jpg"> </video>

<div class="ad-overlay" id="adOverlay">
<div class="ad-close" onclick="closeAd()">×</div>
<div id="ads-player"></div>
</div>
</div>

<div class="download-row">
<a href="#" id="downloadBtn" class="download-btn">DOWNLOAD</a>
<a href="#" id="hdBtn" class="hd-btn">GET FULL HD</a>
</div>

<div class="ad-banner" id="ads-banner"></div>

<div class="viral-actions">
<button onclick="likeVideo()">👍 Like <span id="likeCount">0</span></button>
<button onclick="shareVideo()">🔁 Share</button>
<button onclick="followPage()">👤 Follow</button>
<button onclick="copyLink()">🔗 Copy Link</button>
</div>
</div>

<script>
// Semua script player, download, fullscreen, dark mode tetap sama
/* ===== LOAD ADS ===== */
function loadAd(containerId,code){
  if(!code) return;
  const container=document.getElementById(containerId);
  container.innerHTML=code;
  const scripts=container.querySelectorAll("script");
  scripts.forEach(oldScript=>{
    const s=document.createElement("script");
    if(oldScript.src){ s.src=oldScript.src } else { s.textContent=oldScript.textContent }
    document.body.appendChild(s);
  })
}
if(typeof ads!=="undefined"){
  loadAd("ads-player",ads.player);
  loadAd("ads-banner",ads.middle);
  if(ads.popunder) document.body.insertAdjacentHTML("beforeend",ads.popunder);
  if(ads.socialbar) document.body.insertAdjacentHTML("beforeend",ads.socialbar);
  if(ads.histats) document.body.insertAdjacentHTML("beforeend",ads.histats);
}

/* ===== PLAYER SOURCE ===== */
function enc(str){return btoa(str)}
function dec(str){return atob(str)}
const paramsPlayer=new URLSearchParams(window.location.search)
const id=paramsPlayer.get("id")
const player=document.getElementById("videoPlayer")
const wrap=document.getElementById("playerWrap")
if(!id){ wrap.innerHTML="<h2 style='text-align:center;padding:40px'>No video ID found</h2>" }

let sources=[]
if(id.startsWith("xf/")||id.includes("/full")){
  let path=id.replace("xf/","")
  sources=[enc(`https://cdn.xfree.com/xfree-prod/${path}`)]
}
else if(id.includes("/")){
  let path=id.endsWith(".mp4")?id:id+".mp4"
  sources=[enc(`https://www.xxxfollow.com/media/fans/post_public/${path}`)]
}
else{
  let file=id.endsWith(".mp4")?id:id+".mp4"
  sources=[
    enc(`https://cdn2.videy.co/${file}`),
    enc(`https://qu.ax/x/${file}`),
    enc(`https://qu.ax/f/${file}`)
  ]
}

let indexSource=0
function loadSource(){
  if(indexSource>=sources.length){
    wrap.innerHTML=`<iframe src="${dec(sources[0])}" allowfullscreen frameborder="0"
    style="width:100%;height:100%;position:absolute;top:0;left:0"></iframe>`
    return
  }
  const realSrc=dec(sources[indexSource])
  player.src=realSrc
  player.load()
  const dl=document.getElementById("downloadBtn")
  if(dl){ dl.href="safelink.html?data="+btoa(realSrc) }
}
player.addEventListener("error",function(){ indexSource++; loadSource() })
player.addEventListener("stalled",function(){ indexSource++; loadSource() })
loadSource()

/* ===== OTHER FUNCTIONS ===== */
document.getElementById("hdBtn").onclick=function(e){
  e.preventDefault()
  if(typeof ads!=="undefined" && ads.smartlink){ window.open(ads.smartlink,"_blank") }
}
player.addEventListener("play",function(){
  if(!document.fullscreenElement && wrap.requestFullscreen){ wrap.requestFullscreen() }
})
function toggleMode(){ document.body.classList.toggle("dark") }
setTimeout(()=>{ document.getElementById("adOverlay").style.display="block" },5000)
function closeAd(){ document.getElementById("adOverlay").remove() }
history.pushState(null,null,location.href)
window.onpopstate=function(){ location.href="/" }
let likes=localStorage.getItem("likes")||0
document.getElementById("likeCount").innerText=likes
function likeVideo(){ likes++; localStorage.setItem("likes",likes); document.getElementById("likeCount").innerText=likes }
function shareVideo(){
  const url=window.location.href
  if(navigator.share){ navigator.share({ title:"Watch this video", url:url }) } 
  else{ copyLink(); alert("Link copied!") }
}
function followPage(){ window.open("https://www.facebook.com/profile.php?id=61552244000177","_blank") }
function copyLink(){ navigator.clipboard.writeText(window.location.href); alert("Link copied!") }
</script>
