<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=https://omg10.com/4/10410353">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            color: #333;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 40px 60px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #1976d2;
        }
        p {
            font-size: 16px;
            margin-bottom: 30px;
        }
        .loader {
            display: inline-block;
            width: 60px;
            height: 60px;
            position: relative;
        }
        .loader div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 48px;
            height: 48px;
            margin: 6px;
            border: 6px solid #1976d2;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #1976d2 transparent transparent transparent;
        }
        .loader div:nth-child(1) { animation-delay: -0.45s; }
        .loader div:nth-child(2) { animation-delay: -0.3s; }
        .loader div:nth-child(3) { animation-delay: -0.15s; }

        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }
        a {
            color: #1976d2;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Redirecting...</h1>
        <p>Please wait while we take you to the destination. If not redirected, <a href="https://omg10.com/4/10410353">click here</a>.</p>
        <div class="loader">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
</body>
</html>
